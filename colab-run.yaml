schema_version: 1

repo:
  # Replace with your repository URL and pin to an exact commit SHA.
  url: https://github.com/<owner>/<repo>.git
  ref: <commit-sha>
  local_dir: /content/workspace/colab-imagegen

runtime:
  workdir: .
  env:
    PYTHONUNBUFFERED: "1"
    HF_HOME: /content/.cache/huggingface
    PORT: "8000"
    MODEL_ID: runwayml/stable-diffusion-v1-5
    API_BEARER_TOKEN: "replace-with-a-long-random-token"
    OUTPUT_DIR: /content/.cache/colab-imagegen/outputs
    CORS_ALLOW_ORIGINS: "*"
    CORS_ALLOW_CREDENTIALS: "false"
    MAX_QUEUE_SIZE: "16"
    MAX_STEPS: "30"
    MAX_WIDTH: "768"
    MAX_HEIGHT: "768"
    # OmniParser: default off. Set to "1" for personal/non-commercial usage in this project.
    OMNIPARSER_ENABLED: "0"
    OMNIPARSER_REPO_URL: https://github.com/microsoft/OmniParser.git
    OMNIPARSER_REPO_REF: master
    OMNIPARSER_DIR: /content/.cache/omniparser/repo
    OMNIPARSER_WEIGHTS_DIR: /content/.cache/omniparser/weights
    OMNIPARSER_DOWNLOAD_WEIGHTS: "1"
    # Preload native OmniParser at service startup to reduce first /ui/parse latency.
    OMNIPARSER_PRELOAD_ON_START: "1"
    # Set for managed tunnel. Leave empty to use Quick Tunnel.
    CF_TUNNEL_TOKEN: ""

steps:
  install:
    - bash scripts/install_runtime.sh
  run:
    - bash scripts/ops.sh start
